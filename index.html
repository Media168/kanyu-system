<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經姓名學排盤系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input { font-size: 16px; padding: 10px; margin: 10px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { font-size: 16px; padding: 10px; width: 100%; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #004494; }
        .result { margin-top: 20px; padding: 15px; background: #eef; border-left: 5px solid #0056b3; border-radius: 4px; display: none; line-height: 1.6; }
        .error { color: #d9534f; font-weight: bold; }
        .highlight { color: #0056b3; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>姓名筆畫計算 (康熙字典)</h2>
        <input type="text" id="nameInput" placeholder="請輸入姓名 (2~4字)" maxlength="4">
        <button onclick="calculateStrokes()">計算總筆畫</button>

        <div id="output" class="result"></div>
    </div>

    <script>
        // 存放字典資料的全域變數
        let kangxiDict = {};

        // 1. 網頁載入時自動讀取 JSON 字典
        async function loadDictionary() {
            try {
                const response = await fetch('kangxi_dictionary.json');
                if (!response.ok) throw new Error('找不到檔案');
                kangxiDict = await response.json();
                console.log('康熙字典載入成功！共收錄 ' + Object.keys(kangxiDict).length + ' 字');
            } catch (error) {
                console.error('字典載入失敗:', error);
                const output = document.getElementById('output');
                output.style.display = 'block';
                output.innerHTML = '<span class="error">載入失敗：請確認 kangxi_dictionary.json 是否存在且路徑正確。</span>';
            }
        }

        // 執行載入
        loadDictionary();

        // 2. 處理按鈕點擊與計算邏輯
        function calculateStrokes() {
            const name = document.getElementById('nameInput').value.trim();
            const output = document.getElementById('output');
            output.style.display = 'block';

            // 檢查字數
            if (name.length < 2 || name.length > 4) {
                output.innerHTML = '<span class="error">請輸入 2 到 4 個字的姓名。</span>';
                return;
            }

            // 檢查字典是否已載入
            if (Object.keys(kangxiDict).length === 0) {
                output.innerHTML = '<span class="error">字典尚未載入完成或發生錯誤，請稍候再試或重整網頁。</span>';
                return;
            }

            let total = 0;
            let detailHtml = [];
            let hasError = false;

            // 逐字查表
            for (let i = 0; i < name.length; i++) {
                const char = name[i];
                const stroke = kangxiDict[char];

                if (stroke) {
                    detailHtml.push(`${char}(${stroke}劃)`);
                    total += stroke;
                } else {
                    detailHtml.push(`${char}(<span class="error">未收錄</span>)`);
                    hasError = true;
                }
            }

            // 顯示結果
            if (hasError) {
                output.innerHTML = `<strong>計算過程：</strong> ${detailHtml.join(' + ')}<br><br><span class="error">警告：有字元未收錄在字典中，無法計算總和。</span>`;
            } else {
                output.innerHTML = `<strong>計算過程：</strong> ${detailHtml.join(' + ')}<br><br><strong>總筆畫數：<span class="highlight">${total}</span> 劃</strong>`;
            }
        }
    </script>
</body>
</html>
