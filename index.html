  <script>
    const _0xM = {1:'木',2:'木',3:'火',4:'火',5:'土',6:'土',7:'金',8:'金',9:'水',0:'水'};
    const _0xS = {'木':'火','火':'土','土':'金','金':'水','水':'木'};
    const _0xK = {'木':'土','土':'水','水':'火','火':'金','金':'木'};
    const _0xT = {1:{n:'乾',b:'111'},2:{n:'兌',b:'110'},3:{n:'離',b:'101'},4:{n:'震',b:'100'},5:{n:'巽',b:'011'},6:{n:'坎',b:'010'},7:{n:'艮',b:'001'},8:{n:'坤',b:'000'}};

    class _0xKNA {
      constructor(d) { this.d = d; }
      _cG(s) {
        let t, r, d, z, l = s.length;
        if(l===3){t=s[0]+1;r=s[0]+s[1];d=s[1]+s[2];z=s[0]+s[1]+s[2];}
        else if(l===2){t=s[0]+1;r=s[0]+s[1];d=s[1]+1;z=s[0]+s[1];}
        else if(l===4){t=s[0]+s[1];r=s[1]+s[2];d=s[2]+s[3];z=s[0]+s[1]+s[2]+s[3];}
        return {t,r,d,z};
      }
      _gW(s) { return _0xM[s%10]; }
      _cR(sj, ob, on) {
        if(sj===ob) return {rl:'比和', rs:'平', d:`五行相同，與${on}關係融洽。`};
        if(_0xS[sj]===ob) return {rl:`${sj}生${ob}`, rs:'吉', d:`自己付出照顧${on}，得人和。`};
        if(_0xS[ob]===sj) return {rl:`${ob}生${sj}`, rs:'大吉', d:`深得${on}的提攜與助力。`};
        if(_0xK[sj]===ob) return {rl:`${sj}剋${ob}`, rs:'凶', d:`對${on}掌控欲強，易生摩擦。`};
        if(_0xK[ob]===sj) return {rl:`${ob}剋${sj}`, rs:'大凶', d:`受到${on}的壓制或拖累。`};
        return {rl:'未知',rs:'平',d:'資料無法判定'};
      }
      _eSC(g) {
        let tw = this._gW(g.t), rw = this._gW(g.r), dw = this._gW(g.d);
        return { cf:`天${tw} - 人${rw} - 地${dw}`, sp:this._cR(rw, tw, '長輩/上司'), sb:this._cR(rw, dw, '晚輩/家庭') };
      }
      _gH(g) {
        let un = (g.t+g.r)%8||8, ln = (g.r+g.d)%8||8, ml = g.z%6||6;
        let bb = _0xT[ln].b + _0xT[un].b;
        let mb = bb.substring(1,4) + bb.substring(2,5);
        let cb = bb.substring(0,ml-1) + (bb[ml-1]==='1'?'0':'1') + bb.substring(ml);
        let fb = (b) => ({full_name:'資料缺失', judgment_modern:'請檢查 JSON 檔案。', lines:[]});
        let fh = (b) => this.d.find(h=>h.binary===b)||fb(b);
        let bH = fh(bb);
        let mLD = (bH.lines&&bH.lines.length>=ml) ? bH.lines[ml-1] : null;
        return { ml, bH, mH:fh(mb), cH:fh(cb), mLD };
      }
      _az(s) {
        let g = this._cG(s);
        return {s, g, sC:this._eSC(g), hx:this._gH(g)};
      }
    }

    let _0xApp = null;

    window.addEventListener('DOMContentLoaded', (e) => {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      if (ua.indexOf("Line") > -1) {
        document.getElementById('lineBlocker').style.display = 'flex';
        document.getElementById('mainContainer').style.display = 'none';
      }
    });

    window.onload = async function() {
      try {
        const response = await fetch('./iching_data.json?v=' + new Date().getTime());
        if (!response.ok) throw new Error('伺服器回應錯誤');
        const dbData = await response.json();
        _0xApp = new _0xKNA(dbData);
        
        const runBtn = document.getElementById('runBtn');
        runBtn.disabled = false;
        runBtn.innerText = '開始排盤';
        document.getElementById('sysStatus').innerText = '';
      } catch (error) {
        document.getElementById('sysStatus').innerText = '❌ 資料庫讀取失敗！請確認檔案。';
      }
    };

    function runAnalysis() {
      if (!_0xApp) { alert("資料庫尚未載入。"); return; }
      const _0xI = document.getElementById('strokeInput').value;
      const _0xS = _0xI.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
      if (_0xS.length < 2 || _0xS.length > 4) { alert("請輸入有效的筆畫格式，例如：16,3,8"); return; }
      
      try {
        let rep = _0xApp._az(_0xS);
        _0xRnd(rep); // 渲染網頁版
        _0xRndDark(rep); // 渲染黑金版圖卡
        
        document.getElementById('exportWrapper').style.display = 'block';
        document.getElementById('saveBtn').style.display = 'block';

        gtag('event', 'calculate_hexagram', { 'event_category': 'Engagement', 'value': _0xS.join(',') });
      } catch (e) { alert("排盤發生錯誤。"); }
    }

    // 網頁版渲染 (白底藍框，供手機快速瀏覽)
    function _0xRnd(d) {
      document.getElementById('gridOutput').innerHTML = `<div class="box"><strong>天格：</strong> ${d.g.t}</div><div class="box"><strong>人格：</strong> ${d.g.r}</div><div class="box"><strong>地格：</strong> ${d.g.d}</div><div class="box"><strong>總格：</strong> ${d.g.z}</div>`;
      document.getElementById('sancaiOutput').innerHTML = `<div class="box" style="margin-top:10px;"><strong>長輩運 (${d.sC.sp.rl})：</strong>${d.sC.sp.d}</div><div class="box" style="margin-top:10px;"><strong>晚輩運 (${d.sC.sb.rl})：</strong>${d.sC.sb.d}</div>`;
      let mH = d.hx.mLD ? `<div class="box moving-line" style="margin-top:10px;"><strong class="moving-line-title">📌 關鍵動爻 (${d.hx.ml} 爻變)</strong>${d.hx.mLD.modern}</div>` : '';
      document.getElementById('hexagramOutput').innerHTML = `<div class="box" style="margin-bottom:10px;"><strong>本卦：</strong> ${d.hx.bH.full_name}<br><small>${d.hx.bH.judgment_modern}</small></div><div class="box" style="margin-bottom:10px;"><strong>變卦：</strong> ${d.hx.cH.full_name}<br><small>${d.hx.cH.judgment_modern}</small></div>${mH}`;
    }

    // 黑金版圖卡渲染 (準備給截圖引擎用)
    function _0xRndDark(d) {
      // 1. 三才五格矩陣
      document.getElementById('share_gridOutput').innerHTML = `
        <div class="grid-item"><span>天格</span><strong>${d.g.t}</strong></div>
        <div class="grid-item"><span>人格</span><strong style="color:#d4af37;">${d.g.r}</strong></div>
        <div class="grid-item"><span>地格</span><strong>${d.g.d}</strong></div>
        <div class="grid-item"><span>總格</span><strong>${d.g.z}</strong></div>
      `;
      document.getElementById('share_sancaiOutput').innerHTML = `
        <div class="sancai-text"><span class="highlight-sancai">整體格局：</span> 天${_0xApp._gW(d.g.t)} - 人${_0xApp._gW(d.g.r)} - 地${_0xApp._gW(d.g.d)}</div>
        <div class="sancai-text"><span class="highlight-sancai">長輩運 (${d.sC.sp.rl})：</span> ${d.sC.sp.d}</div>
        <div class="sancai-text"><span class="highlight-sancai">晚輩運 (${d.sC.sb.rl})：</span> ${d.sC.sb.d}</div>
      `;

      // 2. 易經時空卦象
      let mH = d.hx.mLD ? `<div class="moving-line-box"><div class="ml-title">⚡ 關鍵轉折 (${d.hx.ml} 爻變：${d.hx.mLD.name})</div><div class="ml-text">${d.hx.mLD.modern}</div></div>` : '';
      document.getElementById('share_hexagramOutput').innerHTML = `
        <div class="gua-item">
            <div class="gua-name">本卦 (早年)：${d.hx.bH.full_name}</div>
            <div class="gua-desc">${d.hx.bH.judgment_modern}</div>
        </div>
        <div class="gua-item">
            <div class="gua-name">互卦 (中年)：${d.hx.mH.full_name}</div>
            <div class="gua-desc">${d.hx.mH.judgment_modern}</div>
        </div>
        <div class="gua-item changed">
            <div class="gua-name" style="color:#e74c3c;">變卦 (晚年)：${d.hx.cH.full_name}</div>
            <div class="gua-desc">${d.hx.cH.judgment_modern}</div>
        </div>
        ${mH}
      `;
    }

    // ★★★ 終極截圖法：分身術 + Blob 轉換 (徹底解決截斷與手機當機) ★★★
    function generateAndShowImage() {
      const lo = document.getElementById('loadingOverlay');
      lo.style.display = 'flex';
      gtag('event', 'generate_image', { 'event_category': 'Engagement' });

      setTimeout(() => {
        const sc = document.getElementById('shareCardHidden');
        
        // 創造一個分身來截圖，擺脫捲動高度與 viewport 的限制
        const clone = sc.cloneNode(true);
        clone.style.position = 'absolute';
        clone.style.left = '0';
        clone.style.top = '0';
        clone.style.zIndex = '-9999'; // 藏在畫面最底層
        document.body.appendChild(clone);

        html2canvas(clone, { 
          scale: 2, 
          backgroundColor: '#121212', 
          useCORS: true,
          scrollY: 0,
          scrollX: 0
        }).then(canvas => {
          document.body.removeChild(clone); // 截取完畢馬上移除分身

          const id = canvas.toDataURL('image/png');
          
          // 使用域見感知的 Blob 轉換技術，避免 Base64 過長導致 Safari 破圖
          let a = id.split(','), m = a[0].match(/:(.*?);/)[1], b = atob(a[1]), n = b.length, u = new Uint8Array(n);
          while(n--) { u[n] = b.charCodeAt(n); }
          const bl = new Blob([u], { type: m });
          
          document.getElementById('resultImage').src = URL.createObjectURL(bl);
          lo.style.display = 'none';
          document.getElementById('imageModal').style.display = 'flex';
          
        }).catch(err => {
          if(document.body.contains(clone)) document.body.removeChild(clone);
          lo.style.display = 'none';
          alert("圖卡生成失敗，請稍後再試。");
        });
      }, 500);
    }

    // 原生下載 (同域見感知)
    function downloadImage() {
      gtag('event', 'download_image', { 'event_category': 'Conversion' });
      const s = document.getElementById('resultImage').src;
      if (!s) return;
      const l = document.createElement('a');
      l.href = s;
      l.download = `靈數象限_黑金版排盤_${new Date().getTime()}.png`;
      document.body.appendChild(l);
      l.click();
      document.body.removeChild(l);
    }

    // 原生分享 (同域見感知)
    async function shareImage() {
      gtag('event', 'share_image', { 'event_category': 'Conversion' });
      const s = document.getElementById('resultImage').src;
      if (!s) return;
      try {
        const r = await fetch(s);
        const b = await r.blob();
        const f = new File([b], `靈數象限_黑金版排盤_${new Date().getTime()}.png`, { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [f] })) {
          await navigator.share({ files: [f], title: '靈數象限測算結果' });
        } else {
          alert('您的裝置不支援快速分享，請點擊「下載儲存圖卡」或長按圖片。');
        }
      } catch (e) { console.log('Share canceled', e); }
    }

    function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
  </script>
</body>
