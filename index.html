<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CYRZVWZQBF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date()); gtag('config', 'G-CYRZVWZQBF');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羅導 - 易經姓名學專業排盤</title>
    <style>
        :root { --main: #8b0000; --bg: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--main); }
        .input-group { display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 20px; background: var(--main); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .result-card { display: none; margin-top: 20px; border-top: 2px solid var(--main); padding-top: 20px; line-height: 1.8; }
        .highlight { color: var(--main); font-weight: bold; font-size: 1.1em; }
        .line-box { background: #fff9f9; padding: 15px; border-radius: 8px; border: 1px solid #ffeded; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>易經姓名學排盤系統</h2>
    <div class="input-group">
        <input type="text" id="nameInput" placeholder="請輸入姓名 (2~4字)" maxlength="4">
        <button onclick="analyze()">起卦分析</button>
    </div>

    <div id="result" class="result-card">
        <div id="strokeInfo"></div>
        <hr>
        <div id="ichingInfo"></div>
    </div>
</div>

<script>
    let kangxiDict = {};
    let ichingData = [];

    // 初始化載入
    async function init() {
        try {
            const [k, i] = await Promise.all([fetch('kangxi_dictionary.json'), fetch('iching_data.json')]);
            kangxiDict = await k.json();
            ichingData = await i.json();
        } catch (e) { alert("資料庫載入失敗，請確認檔案路徑。"); }
    }
    init();

    function analyze() {
        const name = document.getElementById('nameInput').value.trim();
        if (name.length < 2 || name.length > 4) return alert("請輸入 2 到 4 字姓名");

        // 1. 取得筆畫
        let strokes = [];
        for (let char of name) {
            let s = kangxiDict[char];
            if (!s) return alert(`字庫未收錄：${char}`);
            strokes.push(s);
        }

        // 2. 姓名學取卦規則 (梅花易數法)
        let upTotal = 0, downTotal = 0;
        if (name.length === 2) { // 單姓單名：上(姓) / 下(名)
            upTotal = strokes[0]; downTotal = strokes[1];
        } else if (name.length === 3) { // 單姓雙名：上(姓) / 下(名+名)
            upTotal = strokes[0]; downTotal = strokes[1] + strokes[2];
        } else if (name.length === 4) { // 複姓雙名：上(姓+姓) / 下(名+名)
            upTotal = strokes[0] + strokes[1]; downTotal = strokes[2] + strokes[3];
        }

        const sumTotal = strokes.reduce((a, b) => a + b, 0);
        
        // 3. 計算餘數 (8為坤)
        const getGuaName = (n) => ["", "乾", "兌", "離", "震", "巽", "坎", "艮", "坤"][(n % 8 === 0) ? 8 : n % 8];
        const upName = getGuaName(upTotal);
        const downName = getGuaName(downTotal);
        const movingYao = (sumTotal % 6 === 0) ? 6 : sumTotal % 6;

        // 4. 精確匹配 JSON 中的卦象 (使用 trigrams 屬性)
        const targetGua = ichingData.find(g => g.trigrams.upper === upName && g.trigrams.lower === downName);

        // 5. 顯示結果
        document.getElementById('result').style.display = 'block';
        document.getElementById('strokeInfo').innerHTML = `
            <strong>筆畫：</strong>${name.split('').map((c,i)=>`${c}(${strokes[i]})`).join(' + ')} = <span class="highlight">${sumTotal}</span> 劃<br>
            <strong>結構：</strong>上卦基礎(${upTotal}) / 下卦基礎(${downTotal})`;

        if (targetGua) {
            const yaoObj = targetGua.lines.find(l => l.position === movingYao) || targetGua.lines[movingYao-1];
            document.getElementById('ichingInfo').innerHTML = `
                <div style="font-size:1.2em; font-weight:bold; color:#8b0000;">本卦：${targetGua.full_name} (${targetGua.name})</div>
                <div><strong>變爻：</strong>第 ${movingYao} 爻變</div>
                <div class="line-box">
                    <strong>【第 ${movingYao} 爻辭】</strong><br>
                    ${yaoObj.text}<br>
                    <small style="color:#666;">解析：${yaoObj.modern}</small>
                </div>
                <div style="margin-top:10px;"><strong>【大象傳】</strong><br>${targetGua.judgment_modern}</div>
            `;
        }

        // GA4 事件
        if (typeof gtag === 'function') gtag('event', 'divination', { 'name': name, 'total': sumTotal });
    }
</script>
</body>
</html>
